<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Action Hub</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    min-height: 100vh;
    background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2000') center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 340px;
    padding: 20px;
    border-radius: 32px;
    backdrop-filter: blur(30px) saturate(180%);
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    box-shadow:
        0 8px 32px rgba(0,0,0,0.25),
        inset 0 1px 1px rgba(255,255,255,0.3);
}

.title {
    color: white;
    text-align: center;
    margin-bottom: 20px;
    font-size: 28px;
    font-weight: 700;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 12px;
}

.btn {
    height: 90px;
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: .2s;
}

.btn:active {
    transform: scale(0.95);
}

.footer {
    text-align: center;
    color: rgba(255,255,255,0.7);
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
    <div class="title">Action Hub</div>

    <div class="grid">
        <button class="btn">💬 ChatGPT</button>
        <button class="btn">🎵 Music</button>
        <button class="btn">📸 Camera</button>
        <button class="btn">🔦 Light</button>
        <button class="btn">🌐 Safari</button>
        <button class="btn">🎲 Random</button>
    </div>

    <div class="footer">
        Liquid Glass Inspired
    </div>
</div>

</body>
</html>
