<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Glass Hub</title>

<style>
:root{
    --glass: rgba(255,255,255,.08);
    --glass-border: rgba(255,255,255,.18);
    --text: rgba(255,255,255,.95);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at 20% 20%, #4f7cff 0%, transparent 30%),
    radial-gradient(circle at 80% 30%, #8c6fff 0%, transparent 35%),
    radial-gradient(circle at 50% 80%, #00c6ff 0%, transparent 40%),
    #050816;
}

/* Flytande bubblor */

.bubble{
    position:absolute;
    border-radius:50%;
    backdrop-filter:blur(25px);
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.12);
    animation:float linear infinite;
}

.b1{
    width:250px;
    height:250px;
    left:10%;
    top:15%;
    animation-duration:18s;
}

.b2{
    width:180px;
    height:180px;
    right:15%;
    top:20%;
    animation-duration:14s;
}

.b3{
    width:300px;
    height:300px;
    bottom:5%;
    left:40%;
    animation-duration:22s;
}

@keyframes float{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-30px);
    }
}

/* Huvudkort */

.card{
    width:380px;
    padding:24px;

    position:relative;

    background:var(--glass);
    backdrop-filter:blur(50px) saturate(180%);
    -webkit-backdrop-filter:blur(50px) saturate(180%);

    border:1px solid var(--glass-border);
    border-radius:36px;

    box-shadow:
    0 20px 60px rgba(0,0,0,.35),
    inset 0 1px 1px rgba(255,255,255,.25),
    inset 0 -1px 1px rgba(255,255,255,.05);
}

/* Reflektion */

.card::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:36px;

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,.35),
        transparent 30%
    );

    pointer-events:none;
}

.header{
    text-align:center;
    color:white;
    margin-bottom:24px;
}

.header h1{
    font-size:34px;
    font-weight:700;
    letter-spacing:-1px;
}

.header p{
    opacity:.65;
    margin-top:4px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
}

.btn{
    position:relative;

    height:100px;

    border:none;
    border-radius:28px;

    background:rgba(255,255,255,.08);

    backdrop-filter:blur(20px);

    color:var(--text);
    font-size:17px;

    transition:.25s ease;

    overflow:hidden;
}

.btn::before{
    content:"";
    position:absolute;

    width:150%;
    height:150%;

    top:-120%;
    left:-120%;

    background:
    linear-gradient(
        135deg,
        rgba(255,255,255,.25),
        transparent
    );

    transition:.4s;
}

.btn:hover::before{
    top:0;
    left:0;
}

.btn:active{
    transform:scale(.96);
}

.icon{
    display:block;
    font-size:28px;
    margin-bottom:8px;
}

.footer{
    text-align:center;
    margin-top:18px;
    color:rgba(255,255,255,.55);
    font-size:12px;
}
</style>
</head>
<body>

<div class="bubble b1"></div>
<div class="bubble b2"></div>
<div class="bubble b3"></div>

<div class="card">

    <div class="header">
        <h1>Liquid Hub</h1>
        <p>Action Button Center</p>
    </div>

    <div class="grid">

        <button class="btn">
            <span class="icon">💬</span>
            ChatGPT
        </button>

        <button class="btn">
            <span class="icon">🎵</span>
            Music
        </button>

        <button class="btn">
            <span class="icon">📸</span>
            Camera
        </button>

        <button class="btn">
            <span class="icon">🔦</span>
            Light
        </button>

        <button class="btn">
            <span class="icon">🌐</span>
            Safari
        </button>

        <button class="btn">
            <span class="icon">🎲</span>
            Random
        </button>

    </div>

    <div class="footer">
        Designed for iPhone Action Button
    </div>

</div>

</body>
</html>
